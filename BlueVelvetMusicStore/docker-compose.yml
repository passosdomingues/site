# @lastUpdate 2025 December 10 (Wed)
# @brief Docker Compose configuration for Backend and Frontend.
# @us US-0000 Project Configuration - Granularity: Containerization
version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network

  frontend:
    build: ./blue-velvet-music-store-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  uploads_data:
