name: Build & Deploy — Site Pessoal

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'Deploy manual via GitHub Actions'

permissions:
  contents: read
  pages: write
  id-token: write

# Apenas um deploy por vez — cancela o anterior se houver fila
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build
  # ─────────────────────────────────────────────
  build:
    name: Build Vite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './site-pessoal/package-lock.json'

      - name: Instalar dependências
        working-directory: ./site-pessoal
        run: npm ci

      - name: Build do projeto (Vite)
        working-directory: ./site-pessoal
        run: npm run build

      - name: Upload do artefato de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site-pessoal/dist

  # ─────────────────────────────────────────────
  # JOB 2: Deploy (só roda após build bem-sucedido)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy para GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
