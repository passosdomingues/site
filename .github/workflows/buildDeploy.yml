name: Build & Deploy — Site Pessoal

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'Deploy manual'

# Permissões necessárias para push na branch gh-pages
permissions:
  contents: write

# Apenas um deploy por vez
concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy → gh-pages
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout completo do repositório
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Node.js com cache de npm
      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './site-pessoal/package-lock.json'

      # 3. Instalar dependências (ci = determinístico, usa lock file)
      - name: Instalar dependências
        working-directory: ./site-pessoal
        run: npm ci

      # 4. Build do projeto (Vite)
      - name: Build do projeto (Vite)
        working-directory: ./site-pessoal
        run: npm run build
        env:
          NODE_ENV: production

      # 5. Deploy da pasta dist/ para a branch gh-pages
      #    Este método atualiza a branch gh-pages. Para o site ir ao ar,
      #    certifique-se de que nas configurações do repositório (Settings -> Pages)
      #    a fonte está configurada como "Deploy from a branch" apontando para "gh-pages".
      - name: Deploy para a branch gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site-pessoal/dist
          publish_branch: gh-pages
          force_orphan: true        # branch gh-pages limpa a cada deploy
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.sha }} — ${{ github.event.head_commit.message || inputs.reason }}'
